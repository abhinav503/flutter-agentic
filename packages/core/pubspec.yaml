name: core
description: Shared infrastructure, design system, and base classes for all FlutterAgentic apps.
publish_to: 'none'
version: 1.1.0
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Service locator (shared `sl` lives here; every app registers against it)
  get_it: ^8.0.1

  # Networking (HttpService owns the single Dio instance)
  dio: ^5.8.0+1

  # Persistence (SharedPreferenceService static singleton)
  shared_preferences: ^2.3.3

  # Device utilities — core is the shared mobile toolbelt
  image_picker: ^1.1.2

  # Functional error handling (Failure / Either across layer boundaries)
  fpdart: ^1.1.0

  # Preset fonts (AppTheme resolves theme_config fontFamily at runtime —
  # no per-app font bundling)
  google_fonts: ^6.2.1

  # Sealed Failure type
  freezed_annotation: ^3.1.0

  # SVG rendering (AppSvgImage atom — brand glyphs, line icons)
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.15
  freezed: ^3.2.5
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
