name: cordelia_base
description: Cordelia monorepo — one shared core package consumed by multiple Flutter apps.
publish_to: 'none'
version: 1.1.0

environment:
  sdk: ^3.12.0

# Dart pub workspace: a single `flutter pub get` here resolves every member,
# and edits to packages/core are picked up live by any running app.
workspace:
  - packages/core
  - apps/jokes
  - apps/doc_scanner
