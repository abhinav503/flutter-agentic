name: flutter_agentic
description: Clean Architecture Flutter template — BLoC + Freezed + Dio + GoRouter.
publish_to: 'none'
version: 1.1.0

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1

  # Dependency injection
  get_it: ^8.0.1

  # Navigation
  go_router: ^17.2.3

  # Networking
  dio: ^5.8.0+1

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Functional error handling
  fpdart: ^1.1.0

  # Receipt scanner
  crypto: ^3.0.3
  image_picker: ^1.1.2
  pdf: ^3.11.1
  share_plus: ^10.0.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.15
  freezed: ^3.2.5
  json_serializable: ^6.9.5

  # BLoC testing
  bloc_test: ^10.0.0

  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/theme/theme_config.json
