name: doc_scanner
description: Receipt/Bill-to-PDF scanner — production app built on the FlutterAgentic template.
publish_to: 'none'
version: 1.1.0
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  core:
    path: ../../packages/core

  # State management
  flutter_bloc: ^9.1.1

  # Navigation
  go_router: ^17.2.3

  # Networking (DioException handling in the data layer)
  dio: ^5.8.0+1

  # Functional error handling
  fpdart: ^1.1.0

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Receipt scanner — app-specific
  crypto: ^3.0.3
  image_picker: ^1.1.2
  pdf: ^3.11.1
  share_plus: ^10.0.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.15
  freezed: ^3.2.5
  json_serializable: ^6.9.5
  bloc_test: ^10.0.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/theme/theme_config.json
