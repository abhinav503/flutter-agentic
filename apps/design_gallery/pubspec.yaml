name: design_gallery
description: Living style-pack gallery — every atom and block previewed against every theme preset.
publish_to: 'none'
version: 1.0.0
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  core:
    path: ../../packages/core
  widgetbook: ^3.25.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
